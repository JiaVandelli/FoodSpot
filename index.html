<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shape Runner (Tris & Annullamento)</title>
    <style>
        /* === STILI GLOBALI === */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        #game-container {
            width: 100%;
            max-width: 400px;
            height: 100%;
            max-height: 800px;
            background-color: #1e293b;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* === UI SUPERIORE (INVENTARIO E SCORE) === */
        #ui-top {
            display: flex;
            flex-direction: column;
            padding: 15px;
            background: rgba(15, 23, 42, 0.95);
            z-index: 10;
            border-bottom: 2px solid #334155;
            gap: 15px;
        }

        #score-container {
            display: flex;
            justify-content: space-between;
            font-size: 20px;
            font-weight: bold;
            color: #38bdf8;
        }

        #inventory-slots {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .slot {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #334155;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* === STILI FIGURE GEOMETRICHE === */
        .shape-item {
            width: 24px;
            height: 24px;
        }

        .falling-object .shape-item {
            width: 40px;
            height: 40px;
        }

        /* Forme */
        .shape-square { border-radius: 4px; }
        .shape-circle { border-radius: 50%; }
        .shape-triangle { clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }
        /* NUOVA FORMA: ROMBO (DIAMOND) */
        .shape-diamond { clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }

        /* Colori */
        .color-red { background-color: #ef4444; }
        .color-blue { background-color: #3b82f6; }
        .color-yellow { background-color: #eab308; }
        /* NUOVO COLORE: VERDE */
        .color-green { background-color: #22c55e; }

        /* === CAMPO DI GIOCO === */
        #board {
            flex-grow: 1;
            position: relative;
            background: linear-gradient(to bottom, #1e293b 0%, #0f172a 100%);
        }

        .lane-divider {
            position: absolute;
            top: 0; bottom: 0;
            width: 2px;
            background: rgba(255, 255, 255, 0.05);
        }
        .ld-1 { left: 33.33%; }
        .ld-2 { left: 66.66%; }

        /* === IL GIOCATORE === */
        #player {
            position: absolute;
            bottom: 40px;
            width: 60px;
            height: 15px;
            background-color: #ffffff;
            border-radius: 10px;
            transform: translateX(-50%);
            transition: left 0.15s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 5;
            box-shadow: 0 0 15px rgba(255,255,255,0.8);
        }

        /* === OGGETTI CADENTI === */
        .falling-object {
            position: absolute;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: translateX(-50%);
        }

        /* Testo fluttuante (es. TRIS! o ANNULLATO!) */
        .floating-text {
            position: absolute;
            font-size: 22px;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            z-index: 20;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translate(-50%, 0) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -60px) scale(1); }
        }

        /* Effetti visivi */
        .flash {
            position: absolute;
            inset: 0;
            opacity: 0;
            z-index: 15;
            pointer-events: none;
        }
        .flash-tris { background: #eab308; animation: flashAnim 0.5s ease-out; }
        .flash-error { background: #ef4444; animation: flashAnim 0.3s ease-out; }

        @keyframes flashAnim {
            0% { opacity: 0.5; }
            100% { opacity: 0; }
        }

        /* === CONTROLLI MOBILE === */
        #controls-wrapper {
            background: #0f172a;
            padding: 15px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        button.ctrl-btn {
            flex: 1;
            padding: 25px 0;
            font-size: 32px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            background: #334155;
            color: white;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }
        button.ctrl-btn:active { transform: scale(0.95); background: #475569; }

        /* === OVERLAY MENU === */
        #overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 50;
            text-align: center;
            padding: 20px;
        }
        #overlay h1 { font-size: 36px; margin-bottom: 10px; color: #f8fafc; }
        #overlay p { margin-bottom: 30px; font-size: 15px; color: #94a3b8; line-height: 1.4; }
        #btn-start {
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-top">
        <div id="score-container">
            <span>Score: <span id="score">0</span></span>
        </div>
        <div id="inventory-slots">
            <div class="slot" id="slot-0"></div>
            <div class="slot" id="slot-1"></div>
            <div class="slot" id="slot-2"></div>
            <div class="slot" id="slot-3"></div>
            <div class="slot" id="slot-4"></div>
        </div>
    </div>

    <div id="board">
        <div class="lane-divider ld-1"></div>
        <div class="lane-divider ld-2"></div>
        <div id="player"></div>
    </div>

    <div id="controls-wrapper">
        <button id="btn-left" class="ctrl-btn">◀</button>
        <button id="btn-right" class="ctrl-btn">▶</button>
    </div>

    <div id="overlay">
        <h1 id="overlay-title">SHAPE RUNNER</h1>
        <p id="overlay-desc">Crea dei TRIS: Colori tutti uguali o diversi AND Forme tutte uguali o diverse.<br><br>Catturi un doppione? Si annulla e libera spazio!<br>Non riempire i 5 slot.</p>
        <button id="btn-start">GIOCA</button>
    </div>
</div>

<script>
    // === COSTANTI E VARIABILI ===
    // AGGIUNTA: 4 forme e 4 colori (ora 16 combinazioni totali)
    const SHAPES = ['square', 'circle', 'triangle', 'diamond'];
    const COLORS = ['red', 'blue', 'yellow', 'green'];
    const LANE_CENTERS = [16.66, 50, 83.33];
    const MAX_INVENTORY = 5;

    let isPlaying = false;
    let score = 0;
    let playerLane = 1; // 0: sx, 1: centro, 2: dx

    let inventory = []; 
    let fallingObjects = [];

    let animationFrameId;
    let framesCounter = 0;
    const speed = 2;          // Velocità dimezzata
    const spawnRate = 150;    // <-- DOPPIO DELLA DISTANZA TRA LE CADUTE (era 70)

    // Elementi DOM
    const board = document.getElementById('board');
    const playerEl = document.getElementById('player');
    const scoreEl = document.getElementById('score');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlayDesc = document.getElementById('overlay-desc');

    // === INIZIALIZZAZIONE ===
    function initGame() {
        fallingObjects.forEach(obj => obj.el.remove());
        fallingObjects = [];
        inventory = [];
        score = 0;
        playerLane = 1;
        framesCounter = 0;

        updateUI();
        playerEl.style.left = `${LANE_CENTERS[playerLane]}%`;

        overlay.style.display = 'none';
        isPlaying = true;

        cancelAnimationFrame(animationFrameId);
        gameLoop();
    }

    function movePlayer(direction) {
        playerLane = Math.max(0, Math.min(2, playerLane + direction));
        playerEl.style.left = `${LANE_CENTERS[playerLane]}%`;
    }

    // === LOGICA TRIS E ANNULLAMENTO ===

    function isValidTris(a, b, c) {
        const shapesValid = (a.shape === b.shape && b.shape === c.shape) || 
                            (a.shape !== b.shape && b.shape !== c.shape && a.shape !== c.shape);
        const colorsValid = (a.color === b.color && b.color === c.color) || 
                            (a.color !== b.color && b.color !== c.color && a.color !== c.color);
        return shapesValid && colorsValid;
    }

    function processCollectedItem(newItem) {
        const duplicateIndex = inventory.findIndex(item => item.shape === newItem.shape && item.color === newItem.color);

        if (duplicateIndex !== -1) {
            inventory.splice(duplicateIndex, 1);
            showFloatingText("ANNULLATO!", '#38bdf8');
            updateUI();
            return;
        }

        inventory.push(newItem);

        let trisFound = false;
        if (inventory.length >= 3) {
            for (let i = 0; i < inventory.length - 2; i++) {
                for (let j = i + 1; j < inventory.length - 1; j++) {
                    for (let k = j + 1; k < inventory.length; k++) {
                        if (isValidTris(inventory[i], inventory[j], inventory[k])) {
                            inventory.splice(k, 1);
                            inventory.splice(j, 1);
                            inventory.splice(i, 1);
                            score += 100;
                            trisFound = true;
                            showFloatingText("TRIS! +100", '#eab308');
                            triggerFlash('flash-tris');
                            break; 
                        }
                    }
                    if (trisFound) break;
                }
                if (trisFound) break;
            }
        }

        if (inventory.length > MAX_INVENTORY) {
            gameOver();
        }

        updateUI();
    }

    // === GESTIONE VISIVA ===

    function createShapeElement(shape, color) {
        const div = document.createElement('div');
        div.className = `shape-item shape-${shape} color-${color}`;
        return div;
    }

    function updateUI() {
        scoreEl.innerText = score;
        for (let i = 0; i < MAX_INVENTORY; i++) {
            const slot = document.getElementById(`slot-${i}`);
            slot.innerHTML = ''; 
            if (i < inventory.length) {
                const item = inventory[i];
                slot.appendChild(createShapeElement(item.shape, item.color));
            }
        }
    }

    // === SPAWN ONDATE ===
    function spawnObjectOnLane(lane) {
        const randomShape = SHAPES[Math.floor(Math.random() * SHAPES.length)];
        const randomColor = COLORS[Math.floor(Math.random() * COLORS.length)];

        const el = document.createElement('div');
        el.className = 'falling-object';
        el.style.left = `${LANE_CENTERS[lane]}%`;
        el.style.top = '-50px';

        el.appendChild(createShapeElement(randomShape, randomColor));
        board.appendChild(el);

        fallingObjects.push({ el, lane, shape: randomShape, color: randomColor, y: -50 });
    }

    function spawnWave() {
        const count = Math.random() < 0.3 ? 3 : 2;
        let availableLanes = [0, 1, 2];
        let chosenLanes = [];
        for (let i = 0; i < count; i++) {
            const idx = Math.floor(Math.random() * availableLanes.length);
            chosenLanes.push(availableLanes[idx]);
            availableLanes.splice(idx, 1);
        }
        chosenLanes.forEach(lane => spawnObjectOnLane(lane));
    }

    function showFloatingText(text, color) {
        const floatEl = document.createElement('div');
        floatEl.className = 'floating-text';
        floatEl.innerText = text;
        floatEl.style.color = color;
        floatEl.style.left = `50%`;
        floatEl.style.top = `${board.getBoundingClientRect().height - 120}px`;
        board.appendChild(floatEl);
        setTimeout(() => floatEl.remove(), 1000);
    }

    function triggerFlash(className) {
        const flash = document.createElement('div');
        flash.className = `flash ${className}`;
        board.appendChild(flash);
        setTimeout(() => flash.remove(), 500);
    }

    function gameOver() {
        isPlaying = false;
        triggerFlash('flash-error');
        setTimeout(() => {
            overlayTitle.innerText = "SPAZIO ESAURITO!";
            overlayTitle.style.color = "#ef4444";
            overlayDesc.innerText = `Punteggio Finale: ${score}\nHai riempito l'inventario senza fare Tris.`;
            document.getElementById('btn-start').innerText = "RIPROVA";
            overlay.style.display = 'flex';
        }, 400);
    }

    // === LOOP DI GIOCO ===
    function gameLoop() {
        if (!isPlaying) return;

        framesCounter++;
        if (framesCounter % spawnRate === 0) spawnWave();

        const playerY = board.getBoundingClientRect().height - 55; 

        for (let i = fallingObjects.length - 1; i >= 0; i--) {
            let obj = fallingObjects[i];
            obj.y += speed;
            obj.el.style.top = `${obj.y}px`;

            if (obj.lane === playerLane && obj.y + 40 >= playerY && obj.y <= playerY + 20) {
                processCollectedItem({ shape: obj.shape, color: obj.color });
                obj.el.remove();
                fallingObjects.splice(i, 1);
            } 
            else if (obj.y > board.getBoundingClientRect().height) {
                obj.el.remove();
                fallingObjects.splice(i, 1);
            }
        }

        if (isPlaying) {
            animationFrameId = requestAnimationFrame(gameLoop);
        }
    }

    // === EVENT LISTENERS ===
    document.getElementById('btn-start').addEventListener('click', initGame);
    document.getElementById('btn-left').addEventListener('touchstart', (e) => { e.preventDefault(); movePlayer(-1); });
    document.getElementById('btn-right').addEventListener('touchstart', (e) => { e.preventDefault(); movePlayer(1); });
    document.getElementById('btn-left').addEventListener('mousedown', () => movePlayer(-1));
    document.getElementById('btn-right').addEventListener('mousedown', () => movePlayer(1));

    window.addEventListener('keydown', (e) => {
        if (!isPlaying) return;
        if (e.key === 'ArrowLeft') movePlayer(-1);
        if (e.key === 'ArrowRight') movePlayer(1);
    });

    updateUI();
</script>
</body>
</html>
