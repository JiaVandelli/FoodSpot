<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magic Runner - Le 4 Sfere (Hardcore)</title>
    <style>
        /* === STILI GLOBALI === */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body {
            font-family: 'Georgia', serif;
            background-color: #0b0510;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        #game-container {
            width: 100%;
            max-width: 400px;
            height: 100%;
            max-height: 800px;
            background: linear-gradient(180deg, #1a0b2e 0%, #0b0510 100%);
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(138, 43, 226, 0.4);
            overflow: hidden;
        }

        /* Tremolio schermo */
        .shake { animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-3px, 0, 0); }
            20%, 80% { transform: translate3d(5px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-7px, 0, 0); }
            40%, 60% { transform: translate3d(7px, 0, 0); }
        }

        /* === UI SUPERIORE === */
        #ui-top {
            display: flex;
            flex-direction: column;
            padding: 15px;
            background: rgba(26, 11, 46, 0.9);
            border-bottom: 2px solid #8a2be2;
            z-index: 10;
            gap: 15px;
            box-shadow: 0 4px 20px rgba(138, 43, 226, 0.3);
        }

        #score-container {
            display: flex;
            justify-content: space-between;
            font-size: 20px;
            font-weight: bold;
            color: #d8b4fe;
            text-shadow: 0 0 10px #d8b4fe;
        }

        /* Slot per le 4 sfere magiche */
        #inventory-slots {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .slot {
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #4c1d95;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
            transition: all 0.3s;
        }

        /* === ENTITÀ MAGICHE === */
        .entity-item { width: 30px; height: 30px; border-radius: 50%; }
        .falling-object .entity-item { width: 45px; height: 45px; }

        /* Colori Sfere Elementali */
        .color-red { background: radial-gradient(circle at 30% 30%, #ff6b6b, #c92a2a); box-shadow: 0 0 20px #ff6b6b; }
        .color-blue { background: radial-gradient(circle at 30% 30%, #4facfe, #00f2fe); box-shadow: 0 0 20px #4facfe; }
        .color-yellow { background: radial-gradient(circle at 30% 30%, #fde047, #ca8a04); box-shadow: 0 0 20px #fde047; }
        .color-green { background: radial-gradient(circle at 30% 30%, #69db7c, #2b8a3e); box-shadow: 0 0 20px #69db7c; }

        /* Buco Nero */
        .blackhole {
            background: #000;
            border: 2px solid #8a2be2;
            box-shadow: 0 0 20px #8a2be2, inset 0 0 15px #4c1d95;
            animation: spin 1.5s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Fiamma Magica */
        .flame {
            background: radial-gradient(circle, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            border-radius: 50% 0 50% 50%;
            transform: rotate(-45deg);
            box-shadow: 0 0 20px #ff9a9e;
            animation: flicker 0.4s alternate infinite;
        }
        .falling-object .flame { width: 35px; height: 35px; margin-top: 10px; }
        @keyframes flicker { 0% { transform: rotate(-45deg) scale(0.9); } 100% { transform: rotate(-45deg) scale(1.15); } }

        /* Scudo Pick-up (Pozione) */
        .shield-pickup {
            background: radial-gradient(circle, #a78bfa, #7c3aed);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            box-shadow: 0 0 15px #a78bfa;
        }

        /* === CAMPO DI GIOCO === */
        #board {
            flex-grow: 1;
            position: relative;
            background: url('data:image/svg+xml;utf8,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="1" fill="white" opacity="0.2"/></svg>');
            background-size: 50px 50px;
            animation: stars 2.5s linear infinite;
            overflow: hidden;
        }
        @keyframes stars { from { background-position: 0 0; } to { background-position: 0 100px; } }

        .lane-divider {
            position: absolute;
            top: 0; bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, transparent, rgba(138, 43, 226, 0.3), transparent);
        }
        .ld-1 { left: 33.33%; }
        .ld-2 { left: 66.66%; }

        /* === IL GIOCATORE (Calderone) === */
        #player {
            position: absolute;
            bottom: 60px;
            width: 50px;
            height: 40px;
            background: #2d3748;
            border-radius: 10px 10px 25px 25px;
            border-top: 6px solid #4a5568;
            transform: translateX(-50%);
            transition: left 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Movimento più reattivo */
            z-index: 5;
            box-shadow: inset 0 -10px 10px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
        }
        /* Effetto scudo sul giocatore */
        #player.has-shield {
            box-shadow: 0 0 35px #a78bfa, 0 0 15px #7c3aed, inset 0 -10px 10px rgba(0,0,0,0.5);
            border-color: #a78bfa;
        }
        /* Il liquido nel calderone */
        #player::before {
            content: '';
            position: absolute;
            top: -4px;
            width: 38px;
            height: 8px;
            background: #8a2be2;
            border-radius: 50%;
            box-shadow: 0 0 15px #8a2be2;
        }

        /* === OGGETTI CADENTI === */
        .falling-object {
            position: absolute;
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: translateX(-50%);
            z-index: 4;
        }

        /* Testo fluttuante */
        .floating-text {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            z-index: 20;
            text-align: center;
            text-shadow: 0 2px 8px #000;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translate(-50%, 0) scale(0.5); }
            20% { transform: translate(-50%, -15px) scale(1.1); }
            100% { opacity: 0; transform: translate(-50%, -70px) scale(1); }
        }

        /* === CONTROLLI === */
        #controls-wrapper {
            background: #0b0510;
            padding: 15px;
            display: flex;
            gap: 15px;
            z-index: 10;
            border-top: 2px solid #2d1b4e;
        }
        button.ctrl-btn {
            flex: 1;
            padding: 20px 0;
            font-size: 30px;
            border: 2px solid #4c1d95;
            border-radius: 12px;
            background: #1a0b2e;
            color: #d8b4fe;
            cursor: pointer;
            box-shadow: 0 4px 0 #0b0510;
        }
        button.ctrl-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #0b0510; }

        /* === OVERLAY MENU === */
        #overlay {
            position: absolute;
            inset: 0;
            background: rgba(11, 5, 16, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 50;
            text-align: center;
            padding: 20px;
        }
        #overlay-title { 
            font-size: 42px; 
            margin-bottom: 15px; 
            color: #d8b4fe; 
            text-shadow: 0 0 20px #8a2be2;
        }
        #overlay p { margin-bottom: 30px; font-size: 16px; color: #a1a1aa; line-height: 1.5; }
        #overlay span.highlight { color: #fde047; font-weight: bold; }
        #btn-start {
            padding: 15px 40px;
            font-size: 22px;
            font-weight: bold;
            background: linear-gradient(45deg, #8a2be2, #4c1d95);
            color: white;
            border: 2px solid #d8b4fe;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(138, 43, 226, 0.5);
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-top">
        <div id="score-container">
            <span>Rituale: <span id="score">0</span></span>
        </div>
        <div id="inventory-slots">
            <div class="slot" id="slot-0"></div>
            <div class="slot" id="slot-1"></div>
            <div class="slot" id="slot-2"></div>
            <div class="slot" id="slot-3"></div>
        </div>
    </div>

    <div id="board">
        <div class="lane-divider ld-1"></div>
        <div class="lane-divider ld-2"></div>
        <div id="player"></div>
    </div>

    <div id="controls-wrapper">
        <button id="btn-left" class="ctrl-btn">◀</button>
        <button id="btn-right" class="ctrl-btn">▶</button>
    </div>

    <div id="overlay">
        <h1 id="overlay-title">LE 4 SFERE</h1>
        <p id="overlay-desc">
            Raccogli una Sfera per ogni colore per <span class="highlight">VINCERE</span>.<br><br>
            🌌 <strong>Buco Nero:</strong> Morte Certa.<br>
            🔥 <strong>Fiamma Magica:</strong> Brucia una tua sfera.<br>
            🛡️ <strong>Scudo:</strong> Ti salva da un Buco Nero.<br><br>
            <em>I pericoli sono ovunque, trova la via sicura!</em>
        </p>
        <button id="btn-start">INIZIA RITUALE</button>
    </div>
</div>

<script>
    const COLORS = ['red', 'blue', 'yellow', 'green'];
    const LANE_CENTERS = [16.66, 50, 83.33];
    const WIN_TARGET = 4;

    let isPlaying = false;
    let score = 0;
    let playerLane = 1; 
    let inventory = []; 
    let hasShield = false;
    let fallingObjects = [];

    let currentSpeed = 4.5; // Partenza leggermente più veloce
    let framesCounter = 0;
    let animationFrameId;

    const board = document.getElementById('board');
    const playerEl = document.getElementById('player');
    const scoreEl = document.getElementById('score');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlayDesc = document.getElementById('overlay-desc');
    const gameContainer = document.getElementById('game-container');

    function initGame() {
        fallingObjects.forEach(obj => obj.el.remove());
        fallingObjects = [];
        inventory = [];
        score = 0;
        playerLane = 1;
        framesCounter = 0;
        currentSpeed = 4.5;
        
        removeShield();
        updateUI();
        playerEl.style.left = `${LANE_CENTERS[playerLane]}%`;
        
        overlay.style.display = 'none';
        isPlaying = true;

        cancelAnimationFrame(animationFrameId);
        gameLoop();
    }

    function movePlayer(direction) {
        playerLane = Math.max(0, Math.min(2, playerLane + direction));
        playerEl.style.left = `${LANE_CENTERS[playerLane]}%`;
    }

    function shakeScreen() {
        gameContainer.classList.remove('shake');
        void gameContainer.offsetWidth; 
        gameContainer.classList.add('shake');
    }

    function applyShield() {
        hasShield = true;
        playerEl.classList.add('has-shield');
        showFloatingText("Scudo Attivo!", "#a78bfa");
    }
    
    function removeShield() {
        hasShield = false;
        playerEl.classList.remove('has-shield');
    }

    function processCollision(entity) {
        if (entity.type === 'sphere') {
            score += 50;
            if (!inventory.includes(entity.color)) {
                inventory.push(entity.color);
                showFloatingText("+ Sfera", entity.color === 'red' ? '#ff6b6b' : entity.color === 'blue' ? '#4facfe' : entity.color === 'yellow' ? '#fde047' : '#69db7c');
                
                if (inventory.length === WIN_TARGET) {
                    gameWon();
                }
            } else {
                showFloatingText("+ Mana", "#fff");
            }
        } 
        else if (entity.type === 'shield') {
            score += 20;
            applyShield();
        }
        else if (entity.type === 'blackhole') {
            shakeScreen();
            if (hasShield) {
                removeShield();
                showFloatingText("Scudo Infranto!", "#ff0000");
            } else {
                gameOver("RISUCCHIATO!");
            }
        }
        else if (entity.type === 'flame') {
            shakeScreen();
            if (inventory.length > 0) {
                const randomIndex = Math.floor(Math.random() * inventory.length);
                const lostColor = inventory.splice(randomIndex, 1)[0];
                showFloatingText("Sfera Bruciata!", "#ff9a9e");
            } else {
                showFloatingText("Scottatura!", "#ff9a9e");
            }
        }
        updateUI();
    }

    function createEntityElement(type, color = null) {
        const div = document.createElement('div');
        if (type === 'sphere') div.className = `entity-item color-${color}`;
        else if (type === 'blackhole') div.className = `entity-item blackhole`;
        else if (type === 'flame') div.className = `entity-item flame`;
        else if (type === 'shield') div.className = `entity-item shield-pickup`;
        return div;
    }

    function updateUI() {
        scoreEl.innerText = score;
        for (let i = 0; i < WIN_TARGET; i++) {
            const slot = document.getElementById(`slot-${i}`);
            slot.innerHTML = ''; 
            slot.style.borderColor = '#4c1d95'; 
            if (i < inventory.length) {
                const color = inventory[i];
                slot.appendChild(createEntityElement('sphere', color));
                slot.style.borderColor = color === 'red' ? '#ff6b6b' : color === 'blue' ? '#4facfe' : color === 'yellow' ? '#fde047' : '#69db7c';
            }
        }
    }

    // === LOGICA DI SPAWN ESTREMA ===
    function spawnWave() {
        let availableLanes = [0, 1, 2];
        
        // Scegli UNA corsia che sarà PER FORZA sicura
        const safeIndex = Math.floor(Math.random() * availableLanes.length);
        const safeLane = availableLanes.splice(safeIndex, 1)[0];

        // Riempi corsia sicura (30% Sfera, 15% Scudo, 55% Vuoto)
        let rSafe = Math.random();
        if (rSafe < 0.30) spawnEntity(safeLane, 'sphere');
        else if (rSafe < 0.45) spawnEntity(safeLane, 'shield');

        // Riempi le altre corsie con pericoli (45% Buco Nero, 30% Fiamma, 15% Sfera, 10% Vuoto)
        availableLanes.forEach(lane => {
            let rDanger = Math.random();
            if (rDanger < 0.45) spawnEntity(lane, 'blackhole');
            else if (rDanger < 0.75) spawnEntity(lane, 'flame');
            else if (rDanger < 0.90) spawnEntity(lane, 'sphere');
        });
    }

    function spawnEntity(lane, type) {
        const el = document.createElement('div');
        el.className = 'falling-object';
        el.style.left = `${LANE_CENTERS[lane]}%`;
        el.style.top = '-60px';

        let color = null;
        if (type === 'sphere') {
            color = COLORS[Math.floor(Math.random() * COLORS.length)];
        }

        el.appendChild(createEntityElement(type, color));
        board.appendChild(el);

        fallingObjects.push({ el, lane, type, color, y: -60 });
    }

    function showFloatingText(text, color) {
        const floatEl = document.createElement('div');
        floatEl.className = 'floating-text';
        floatEl.innerText = text;
        floatEl.style.color = color;
        floatEl.style.left = `50%`;
        floatEl.style.top = `${board.getBoundingClientRect().height - 120}px`;
        board.appendChild(floatEl);
        setTimeout(() => floatEl.remove(), 1000);
    }

    function gameWon() {
        isPlaying = false;
        overlayTitle.innerText = "RITUALE COMPIUTO!";
        overlayTitle.style.color = "#fde047";
        overlayDesc.innerHTML = `<span style="font-size:24px; color:#fff;">Punteggio: ${score}</span><br><br>Hai raccolto tutte le 4 Essenze Magiche. Sei un maestro stregone!`;
        document.getElementById('btn-start').innerText = "NUOVA PARTITA";
        overlay.style.display = 'flex';
    }

    function gameOver(reason) {
        isPlaying = false;
        overlayTitle.innerText = reason;
        overlayTitle.style.color = "#ef4444";
        overlayDesc.innerHTML = `<span style="font-size:24px; color:#fff;">Punteggio: ${score}</span><br><br>Sfere Raccolte: ${inventory.length}/4<br>La magia ti ha sopraffatto.`;
        document.getElementById('btn-start').innerText = "RIPROVA";
        overlay.style.display = 'flex';
    }

    function gameLoop() {
        if (!isPlaying) return;
        framesCounter++;
        
        if (framesCounter % 600 === 0) currentSpeed += 0.5;
        
        // Frequenza di spawn molto più serrata (base passata da 150 a 90)
        let spawnRate = Math.max(35, Math.floor(90 / (currentSpeed/4.5)));
        if (framesCounter % spawnRate === 0) spawnWave();

        const playerY = board.getBoundingClientRect().height - 80; 

        for (let i = fallingObjects.length - 1; i >= 0; i--) {
            let obj = fallingObjects[i];
            obj.y += currentSpeed;
            obj.el.style.top = `${obj.y}px`;

            if (obj.lane === playerLane && obj.y + 40 >= playerY && obj.y <= playerY + 40) {
                processCollision(obj);
                obj.el.remove();
                fallingObjects.splice(i, 1);
            } 
            else if (obj.y > board.getBoundingClientRect().height) {
                obj.el.remove();
                fallingObjects.splice(i, 1);
            }
        }

        if (isPlaying) {
            animationFrameId = requestAnimationFrame(gameLoop);
        }
    }

    document.getElementById('btn-start').addEventListener('click', initGame);
    
    const btnLeft = document.getElementById('btn-left');
    const btnRight = document.getElementById('btn-right');
    btnLeft.addEventListener('touchstart', (e) => { e.preventDefault(); movePlayer(-1); });
    btnRight.addEventListener('touchstart', (e) => { e.preventDefault(); movePlayer(1); });
    btnLeft.addEventListener('mousedown', () => movePlayer(-1));
    btnRight.addEventListener('mousedown', () => movePlayer(1));

    window.addEventListener('keydown', (e) => {
        if (!isPlaying) return;
        if (e.key === 'ArrowLeft' || e.key === 'a') movePlayer(-1);
        if (e.key === 'ArrowRight' || e.key === 'd') movePlayer(1);
    });

    updateUI();
</script>
</body>
</html>
