<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magic Runner - Hardcore Edition</title>
    <style>
        /* === STILI GLOBALI === */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body {
            font-family: 'Georgia', serif;
            background-color: #05020a;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        #game-container {
            width: 100%;
            max-width: 380px; 
            height: 100%;
            max-height: 750px;
            background: linear-gradient(180deg, #1a0b2e 0%, #0b0510 100%);
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.5);
            overflow: hidden;
        }

        .shake { animation: shake 0.2s cubic-bezier(.36,.07,.19,.97) both; }
        .shake-hard { animation: shakeHard 0.3s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            0%, 100% { transform: translate3d(0, 0, 0); }
            25% { transform: translate3d(6px, 0, 0); }
            50% { transform: translate3d(-6px, 0, 0); }
            75% { transform: translate3d(6px, 0, 0); }
        }
        @keyframes shakeHard {
            0%, 100% { transform: translate3d(0, 0, 0); }
            20%, 60% { transform: translate3d(15px, 5px, 0); }
            40%, 80% { transform: translate3d(-15px, -5px, 0); }
        }

        /* === AURA DEL BOSS === */
        #boss-area {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 120px;
            background: linear-gradient(to bottom, rgba(220, 38, 38, 0.95), transparent);
            display: none;
            justify-content: center;
            align-items: flex-start;
            padding-top: 15px;
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px #dc2626, 0 0 40px #dc2626;
            z-index: 3;
            letter-spacing: 2px;
            animation: bossPulse 0.5s infinite alternate;
        }
        @keyframes bossPulse { 0% { opacity: 0.8; } 100% { opacity: 1; transform: scale(1.02); } }

        /* === UI SUPERIORE === */
        #ui-top {
            display: flex;
            justify-content: center;
            padding: 15px;
            background: rgba(26, 11, 46, 0.95);
            border-bottom: 2px solid #8a2be2;
            z-index: 10;
        }

        #inventory-slots { display: flex; justify-content: center; gap: 12px; }
        .slot {
            width: 40px; height: 40px; background: rgba(0, 0, 0, 0.6);
            border: 2px solid #4c1d95; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
        }

        /* === ENTITÀ MAGICHE === */
        .entity-item { width: 35px; height: 35px; border-radius: 50%; }
        .falling-object .entity-item { width: 45px; height: 45px; }

        .color-red { background: radial-gradient(circle at 30% 30%, #ff6b6b, #c92a2a); box-shadow: 0 0 15px #ff6b6b; }
        .color-blue { background: radial-gradient(circle at 30% 30%, #4facfe, #00f2fe); box-shadow: 0 0 15px #4facfe; }
        .color-yellow { background: radial-gradient(circle at 30% 30%, #fde047, #ca8a04); box-shadow: 0 0 15px #fde047; }
        .color-green { background: radial-gradient(circle at 30% 30%, #69db7c, #2b8a3e); box-shadow: 0 0 15px #69db7c; }

        .blackhole {
            background: #000; border: 2px solid #8a2be2; box-shadow: 0 0 20px #8a2be2;
            animation: spin 1s linear infinite;
        }
        /* Il Vero Buco Nero del Boss */
        .boss-attack {
            border-color: #ff0000;
            box-shadow: 0 0 30px #ff0000, inset 0 0 20px #7f1d1d;
            animation: spinFast 0.5s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spinFast { 100% { transform: rotate(-360deg) scale(1.1); } }

        .flame {
            background: radial-gradient(circle, #ff9a9e 0%, #fecfef 100%);
            border-radius: 50% 0 50% 50%; transform: rotate(-45deg);
            box-shadow: 0 0 15px #ff9a9e; animation: flicker 0.3s alternate infinite;
        }
        @keyframes flicker { 0% { transform: rotate(-45deg) scale(0.9); } 100% { transform: rotate(-45deg) scale(1.1); } }

        .shield-pickup {
            background: radial-gradient(circle, #a78bfa, #7c3aed);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            box-shadow: 0 0 15px #a78bfa;
        }

        .hourglass {
            background: radial-gradient(circle, #fcd34d, #b45309);
            clip-path: polygon(20% 0%, 80% 0%, 50% 50%, 80% 100%, 20% 100%, 50% 50%);
            box-shadow: 0 0 20px #fcd34d; animation: floatGlass 1.5s ease-in-out infinite alternate;
        }
        @keyframes floatGlass { 0% { transform: translateY(-3px) scale(0.95); } 100% { transform: translateY(3px) scale(1.05); } }

        .wizard-lightning {
            background: #ffffff;
            clip-path: polygon(30% 0%, 100% 0%, 60% 50%, 90% 50%, 10% 100%, 40% 50%, 10% 50%);
            box-shadow: 0 0 25px #ffffff, 0 0 40px #ffffff; animation: pulseWhite 0.5s infinite alternate;
        }
        @keyframes pulseWhite { 0% { opacity: 0.8; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1.1); } }

        /* === CAMPO DI GIOCO === */
        #board {
            flex-grow: 1; position: relative;
            background: url('data:image/svg+xml;utf8,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="1" fill="white" opacity="0.3"/></svg>');
            background-size: 50px 50px; animation: stars 1.5s linear infinite; overflow: hidden;
        }
        @keyframes stars { from { background-position: 0 0; } to { background-position: 0 100px; } }

        .lane-divider { position: absolute; top: 0; bottom: 0; width: 2px; background: rgba(138, 43, 226, 0.15); }
        .ld-1 { left: 33.33%; } .ld-2 { left: 66.66%; }

        /* === IL GIOCATORE === */
        #player {
            position: absolute; bottom: 40px; width: 45px; height: 35px; background: #2d3748;
            border-radius: 5px 5px 20px 20px; border-top: 5px solid #4a5568; transform: translateX(-50%);
            transition: left 0.08s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 5;
        }
        #player.has-shield { box-shadow: 0 0 30px #a78bfa, 0 0 10px #7c3aed; border-color: #a78bfa; }
        #player::before {
            content: ''; position: absolute; top: -3px; width: 35px; height: 6px;
            background: #8a2be2; border-radius: 50%; left: 5px;
        }

        #slow-overlay {
            position: absolute; inset: 0; background: rgba(252, 211, 77, 0.1);
            pointer-events: none; opacity: 0; z-index: 2; transition: opacity 0.3s;
            box-shadow: inset 0 0 50px rgba(252, 211, 77, 0.3);
        }
        #slow-overlay.active { opacity: 1; }

        /* === OGGETTI CADENTI === */
        .falling-object {
            position: absolute; width: 50px; height: 50px;
            display: flex; justify-content: center; align-items: center;
            transform: translateX(-50%); transition: left 0.15s ease-out; z-index: 4;
        }

        .floating-text {
            position: absolute; font-size: 20px; font-weight: bold; pointer-events: none;
            animation: floatUp 0.8s forwards; z-index: 20; text-align: center; text-shadow: 0 2px 5px #000;
        }
        @keyframes floatUp { 0% { opacity: 1; transform: translate(-50%, 0) scale(0.8); } 100% { opacity: 0; transform: translate(-50%, -50px) scale(1.1); } }

        /* === CONTROLLI === */
        #controls-wrapper { background: #0b0510; padding: 10px; display: flex; gap: 10px; height: 150px; z-index: 10; border-top: 2px solid #2d1b4e; }
        button.ctrl-btn {
            flex: 1; font-size: 40px; border: 2px solid #4c1d95; border-radius: 15px; background: #1a0b2e; color: #d8b4fe;
            cursor: pointer; box-shadow: 0 6px 0 #05020a; transition: background 0.1s;
        }
        button.ctrl-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #0b0510; background: #2d1b4e; }

        /* === OVERLAY === */
        #overlay {
            position: absolute; inset: 0; background: rgba(11, 5, 16, 0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 50; text-align: center; padding: 15px;
        }
        #overlay-title { font-size: 40px; margin-bottom: 10px; color: #d8b4fe; text-shadow: 0 0 20px #8a2be2;}
        #overlay p { margin-bottom: 25px; font-size: 15px; color: #a1a1aa; line-height: 1.5; }
        #btn-start {
            padding: 20px 40px; font-size: 20px; font-weight: bold; background: linear-gradient(45deg, #ffffff, #d8b4fe);
            color: #0b0510; border: none; border-radius: 30px; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="boss-area">MORTE CERTA</div>
    <div id="slow-overlay"></div>

    <div id="ui-top">
        <div id="inventory-slots">
            <div class="slot" id="slot-0"></div>
            <div class="slot" id="slot-1"></div>
            <div class="slot" id="slot-2"></div>
            <div class="slot" id="slot-3"></div>
        </div>
    </div>

    <div id="board">
        <div class="lane-divider ld-1"></div>
        <div class="lane-divider ld-2"></div>
        <div id="player"></div>
    </div>

    <div id="controls-wrapper">
        <button id="btn-left" class="ctrl-btn">◀</button>
        <button id="btn-right" class="ctrl-btn">▶</button>
    </div>

    <div id="overlay">
        <h1 id="overlay-title">RITUALE ESTREMO</h1>
        <p id="overlay-desc">
            Le Sfere sono diventate rare.<br><br>
            ⏳ <strong>Clessidra:</strong> Rallenta il tempo.<br>
            👁️ <strong>Boss:</strong> Sopravvivi a 10 veri Buchi Neri (ignorano lo scudo) per ottenere una Sfera sicura.
        </p>
        <button id="btn-start">GIOCA</button>
    </div>
</div>

<script>
    const COLORS = ['red', 'blue', 'yellow', 'green'];
    const LANE_CENTERS = [16.66, 50, 83.33];
    const WIN_TARGET = 4;

    let isPlaying = false;
    let playerLane = 1; 
    let inventory = []; 
    let hasShield = false;
    let fallingObjects = [];
    let waveCounterId = 0;

    let currentSpeed = 5.0; 
    let speedMultiplier = 1.0;
    let slowTimer = null;
    let framesCounter = 0;
    let animationFrameId;

    // Variabili Boss Aggiornate
    let isBossActive = false;
    let bossFrames = 0;
    let bossAttacksFired = 0;
    const BOSS_MAX_ATTACKS = 10; // Aumentato a 10 doppi colpi
    const BOSS_INTERVAL = 1800; 

    const board = document.getElementById('board');
    const playerEl = document.getElementById('player');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlayDesc = document.getElementById('overlay-desc');
    const gameContainer = document.getElementById('game-container');
    const bossArea = document.getElementById('boss-area');
    const slowOverlay = document.getElementById('slow-overlay');

    function initGame() {
        fallingObjects.forEach(obj => obj.el.remove());
        fallingObjects = [];
        inventory = [];
        playerLane = 1;
        framesCounter = 0;
        currentSpeed = 5.0;
        speedMultiplier = 1.0;
        waveCounterId = 0;
        
        isBossActive = false;
        bossArea.style.display = 'none';
        slowOverlay.classList.remove('active');
        clearTimeout(slowTimer);

        removeShield();
        updateUI();
        playerEl.style.left = `${LANE_CENTERS[playerLane]}%`;
        
        overlay.style.display = 'none';
        isPlaying = true;

        cancelAnimationFrame(animationFrameId);
        gameLoop();
    }

    function movePlayer(direction) {
        playerLane = Math.max(0, Math.min(2, playerLane + direction));
        playerEl.style.left = `${LANE_CENTERS[playerLane]}%`;
    }

    function shakeScreen(hard = false) {
        gameContainer.classList.remove('shake', 'shake-hard');
        void gameContainer.offsetWidth; 
        gameContainer.classList.add(hard ? 'shake-hard' : 'shake');
    }

    function applyShield() {
        hasShield = true;
        playerEl.classList.add('has-shield');
        showFloatingText("Scudo!", "#a78bfa");
    }
    
    function removeShield() {
        hasShield = false;
        playerEl.classList.remove('has-shield');
    }

    function applySlowdown() {
        speedMultiplier = 0.45; 
        slowOverlay.classList.add('active');
        showFloatingText("TEMPO LENTO!", "#fcd34d");
        clearTimeout(slowTimer);
        slowTimer = setTimeout(() => {
            speedMultiplier = 1.0;
            slowOverlay.classList.remove('active');
        }, 5000);
    }

    function processCollision(entity) {
        if (entity.type === 'sphere') {
            if (!inventory.includes(entity.color)) {
                inventory.push(entity.color);
                showFloatingText("+ Sfera", entity.color === 'red' ? '#ff6b6b' : entity.color === 'blue' ? '#4facfe' : entity.color === 'yellow' ? '#fde047' : '#69db7c');
                if (inventory.length === WIN_TARGET) gameWon();
            } else {
                showFloatingText("Doppione", "#a1a1aa");
            }
        } 
        else if (entity.type === 'shield') {
            applyShield();
        }
        else if (entity.type === 'hourglass') {
            applySlowdown();
        }
        else if (entity.type === 'wizard') {
            shakeScreen();
            showFloatingText("Scossa!", "#ffffff");
        }
        else if (entity.type === 'blackhole') {
            shakeScreen(true);
            // Logica del Vero Buco Nero
            if (entity.isFast) {
                gameOver("ANNIENTATO!"); // Morte istantanea, ignora lo scudo
            } else if (hasShield) {
                removeShield();
                showFloatingText("Scudo Infranto!", "#ff0000");
            } else {
                gameOver("RISUCCHIATO!");
            }
        }
        else if (entity.type === 'flame') {
            shakeScreen();
            if (inventory.length > 0) {
                const randomIndex = Math.floor(Math.random() * inventory.length);
                inventory.splice(randomIndex, 1);
                showFloatingText("- Sfera!", "#ff9a9e");
            }
        }
        updateUI();
    }

    function createEntityElement(type, color = null, isFast = false) {
        const div = document.createElement('div');
        if (type === 'sphere') div.className = `entity-item color-${color}`;
        else if (type === 'blackhole') div.className = `entity-item blackhole ${isFast ? 'boss-attack' : ''}`;
        else if (type === 'flame') div.className = `entity-item flame`;
        else if (type === 'shield') div.className = `entity-item shield-pickup`;
        else if (type === 'wizard') div.className = `entity-item wizard-lightning`;
        else if (type === 'hourglass') div.className = `entity-item hourglass`;
        return div;
    }

    function updateUI() {
        for (let i = 0; i < WIN_TARGET; i++) {
            const slot = document.getElementById(`slot-${i}`);
            slot.innerHTML = ''; 
            slot.style.borderColor = '#4c1d95'; 
            if (i < inventory.length) {
                const color = inventory[i];
                slot.appendChild(createEntityElement('sphere', color));
                slot.style.borderColor = color === 'red' ? '#ff6b6b' : color === 'blue' ? '#4facfe' : color === 'yellow' ? '#fde047' : '#69db7c';
            }
        }
    }

    // === SPAWN ONDATE NORMALI (SFERE DIMEZZATE) ===
    function spawnWave() {
        waveCounterId++;
        let availableLanes = [0, 1, 2];
        
        // Corsia Sicura: Sfere dimezzate (35%), più spazio vuoto e difese
        const safeIndex = Math.floor(Math.random() * availableLanes.length);
        const safeLane = availableLanes.splice(safeIndex, 1)[0];
        let rSafe = Math.random();
        if (rSafe < 0.35) spawnEntity(safeLane, 'sphere', waveCounterId);
        else if (rSafe < 0.55) spawnEntity(safeLane, 'shield', waveCounterId);
        else if (rSafe < 0.70) spawnEntity(safeLane, 'hourglass', waveCounterId);

        // Corsie Pericolose: Sfere ridotte al 5%, aumentati pericoli
        availableLanes.forEach(lane => {
            let rDanger = Math.random();
            if (rDanger < 0.45) spawnEntity(lane, 'blackhole', waveCounterId);
            else if (rDanger < 0.75) spawnEntity(lane, 'flame', waveCounterId);
            else if (rDanger < 0.95) spawnEntity(lane, 'wizard', waveCounterId); 
            else spawnEntity(lane, 'sphere', waveCounterId); 
        });
    }

    // === LOGICA BOSS (VERI BUCHI NERI) ===
    function startBossPhase() {
        isBossActive = true;
        bossFrames = 0;
        bossAttacksFired = 0;
        bossArea.style.display = 'flex';
        
        fallingObjects.forEach(obj => obj.el.remove());
        fallingObjects = [];
        shakeScreen(true);
    }

    function fireBossAttack() {
        let lanes = [0, 1, 2];
        let freeLane = Math.floor(Math.random() * 3); 
        
        lanes.forEach(lane => {
            if (lane !== freeLane) {
                spawnEntity(lane, 'blackhole', -1, true); 
            }
        });
        shakeScreen();
    }

    function endBossPhase() {
        isBossActive = false;
        bossArea.style.display = 'none';
        
        let missingColors = COLORS.filter(c => !inventory.includes(c));
        if (missingColors.length > 0) {
            let colorToGive = missingColors[Math.floor(Math.random() * missingColors.length)];
            inventory.push(colorToGive);
            showFloatingText("PREMIO BOSS!", "#fde047");
            updateUI();
            if (inventory.length === WIN_TARGET) {
                gameWon();
            }
        }
    }

    function spawnEntity(lane, type, waveId, isBossAtk = false) {
        const el = document.createElement('div');
        el.className = 'falling-object';
        el.style.left = `${LANE_CENTERS[lane]}%`;
        el.style.top = '-50px';

        let color = null;
        if (type === 'sphere') color = COLORS[Math.floor(Math.random() * COLORS.length)];

        el.appendChild(createEntityElement(type, color, isBossAtk));
        board.appendChild(el);

        fallingObjects.push({ el, lane, type, color, y: -50, waveId: waveId, isFast: isBossAtk });
    }

    function showFloatingText(text, color) {
        const floatEl = document.createElement('div');
        floatEl.className = 'floating-text';
        floatEl.innerText = text;
        floatEl.style.color = color;
        floatEl.style.left = `50%`;
        floatEl.style.top = `${board.getBoundingClientRect().height - 180}px`;
        board.appendChild(floatEl);
        setTimeout(() => floatEl.remove(), 800);
    }

    function gameOver(reason) {
        isPlaying = false;
        overlayTitle.innerText = reason;
        overlayTitle.style.color = "#ef4444";
        overlayDesc.innerHTML = `Sfere Raccolte: ${inventory.length}/4<br>Il Caos ha vinto.`;
        document.getElementById('btn-start').innerText = "RIPROVA";
        overlay.style.display = 'flex';
    }

    function gameWon() {
        isPlaying = false;
        overlayTitle.innerText = "VITTORIA ESTREMA!";
        overlayTitle.style.color = "#fde047";
        overlayDesc.innerHTML = `Hai raccolto tutte le essenze!<br>Sei sopravvissuto all'impossibile.`;
        document.getElementById('btn-start').innerText = "NUOVA PARTITA";
        overlay.style.display = 'flex';
    }

    function gameLoop() {
        if (!isPlaying) return;
        framesCounter++;
        
        let actualSpeed = currentSpeed * speedMultiplier;
        
        if (isBossActive) {
            bossFrames++;
            if (bossFrames % 60 === 0 && bossAttacksFired < BOSS_MAX_ATTACKS) {
                fireBossAttack();
                bossAttacksFired++;
            }
            
            if (bossAttacksFired >= BOSS_MAX_ATTACKS && fallingObjects.length === 0) {
                endBossPhase();
            }
        } else {
            if (framesCounter % 600 === 0) currentSpeed += 0.3;
            
            if (framesCounter % BOSS_INTERVAL === 0 && framesCounter > 0) {
                startBossPhase();
            } else {
                let spawnRate = Math.max(25, Math.floor(65 / (actualSpeed/5.0)));
                if (framesCounter % spawnRate === 0) spawnWave();
            }

            if (framesCounter % 30 === 0) {
                let wavesWithWizard = new Set(fallingObjects.filter(o => o.type === 'wizard').map(o => o.waveId));
                wavesWithWizard.forEach(wId => {
                    let waveObjects = fallingObjects.filter(o => o.waveId === wId);
                    let newLanes = [0, 1, 2].sort(() => Math.random() - 0.5);
                    waveObjects.forEach((obj, idx) => {
                        obj.lane = newLanes[idx];
                        obj.el.style.left = `${LANE_CENTERS[obj.lane]}%`;
                    });
                });
            }
        }

        const playerY = board.getBoundingClientRect().height - 70; 

        for (let i = fallingObjects.length - 1; i >= 0; i--) {
            let obj = fallingObjects[i];
            
            let fallSpeed = obj.isFast ? actualSpeed * 1.6 : actualSpeed;
            obj.y += fallSpeed;
            obj.el.style.top = `${obj.y}px`;

            if (obj.lane === playerLane && obj.y + 35 >= playerY && obj.y <= playerY + 35) {
                processCollision(obj);
                obj.el.remove();
                fallingObjects.splice(i, 1);
            } 
            else if (obj.y > board.getBoundingClientRect().height) {
                obj.el.remove();
                fallingObjects.splice(i, 1);
            }
        }

        if (isPlaying) {
            animationFrameId = requestAnimationFrame(gameLoop);
        }
    }

    document.getElementById('btn-start').addEventListener('click', initGame);
    
    const btnLeft = document.getElementById('btn-left');
    const btnRight = document.getElementById('btn-right');
    btnLeft.addEventListener('touchstart', (e) => { e.preventDefault(); movePlayer(-1); });
    btnRight.addEventListener('touchstart', (e) => { e.preventDefault(); movePlayer(1); });
    btnLeft.addEventListener('mousedown', () => movePlayer(-1));
    btnRight.addEventListener('mousedown', () => movePlayer(1));

    window.addEventListener('keydown', (e) => {
        if (!isPlaying) return;
        if (e.key === 'ArrowLeft' || e.key === 'a') movePlayer(-1);
        if (e.key === 'ArrowRight' || e.key === 'd') movePlayer(1);
    });

    updateUI();
</script>
</body>
</html>
