<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Orbo - Il gusto ti orbita</title>

  <link rel="stylesheet" href="styles.css"/>

  <style>
    body {
      margin: 0;
      font-family: Inter, sans-serif;
      background: linear-gradient(180deg, #1a0b2e, #0f051a);
      color: #fff;
    }

    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: linear-gradient(135deg, #1a0b2e, #2d1b4e);
      border-bottom: 1px solid rgba(255,179,71,0.2);
    }

    header img {
      height: 42px;
    }

    .title {
      font-weight: 900;
      font-size: 18px;
      color: #FFB347;
    }

    .menu-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 50px;
      height: 50px;
      border-radius: 14px;
      background: #2d1b4e;
      border: 1px solid #FF8C00;
      color: #FFB347;
      font-size: 18px;
      cursor: pointer;
      z-index: 1000;
    }

    .mobile-nav {
      position: fixed;
      top: 0;
      right: -100%;
      width: 240px;
      height: 100%;
      background: #1a0b2e;
      display: flex;
      flex-direction: column;
      padding: 20px;
      transition: 0.3s;
      z-index: 999;
    }

    .mobile-nav.active {
      right: 0;
    }

    .mobile-nav button {
      background: none;
      border: none;
      color: #FFB347;
      padding: 14px;
      text-align: left;
      font-size: 16px;
      cursor: pointer;
    }

    .view {
      display: none;
      padding: 20px;
    }

    .view.active {
      display: block;
    }

    .hero {
      text-align: center;
      padding: 80px 20px;
    }

    .hero img {
      width: 160px;
      animation: pulse 3s infinite;
    }

    .hero h1 {
      font-size: 28px;
      margin-top: 20px;
      color: #FFB347;
    }

    .btn {
      margin-top: 20px;
      padding: 14px 28px;
      border-radius: 30px;
      border: none;
      background: #FF8C00;
      color: #1a0b2e;
      font-weight: bold;
      cursor: pointer;
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
  </style>
</head>

<body>

<!-- MENU BUTTON -->
<button class="menu-btn" id="menu-toggle">☰</button>

<!-- HEADER -->
<header>
  <img src="src/assets/branding/OrboLogo.svg" alt="Orbo">
  <div class="title">ORBO</div>
</header>

<!-- MOBILE MENU -->
<nav class="mobile-nav" id="mobile-nav">
  <button data-route="#home">🏠 Home</button>
  <button data-route="#search">🔍 Cerca</button>
  <button data-route="#favorites">❤️ Preferiti</button>
  <button data-route="#nearby">📍 Vicino</button>
</nav>

<!-- APP -->
<main>

  <!-- HOME -->
  <section class="view active" id="view-home">
    <div class="hero">
      <img src="src/assets/branding/OrboLogo.svg">
      <h1>Il gusto ti orbita</h1>
      <button class="btn" data-route="#search">Inizia</button>
    </div>
  </section>

  <!-- SEARCH -->
  <section class="view" id="view-search">
    <h2>Cerca</h2>
    <input id="search-input" placeholder="Romantico, brunch..." />
    <div id="results-list"></div>
  </section>

  <!-- FAVORITES -->
  <section class="view" id="view-favorites">
    <h2>Preferiti</h2>
    <div id="favorites-list"></div>
  </section>

  <!-- NEARBY -->
  <section class="view" id="view-nearby">
    <h2>Vicino a te</h2>
    <div id="nearby-list"></div>
  </section>

</main>

<!-- TOAST -->
<div id="toast" style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#FF8C00;color:#000;padding:10px 20px;border-radius:20px;display:none;"></div>

<!-- JS -->
<script src="app.js"></script>

<script>
/* MENU */
document.getElementById('menu-toggle').onclick = () => {
  document.getElementById('mobile-nav').classList.toggle('active');
};

/* ROUTING */
document.body.addEventListener('click', (e) => {
  const btn = e.target.closest('[data-route]');
  if (!btn) return;

  const route = btn.dataset.route;

  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelector(`#view-${route.replace('#','')}`)?.classList.add('active');

  document.getElementById('mobile-nav').classList.remove('active');
});
</script>

</body>
</html>
