<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <!-- Gradiente faccia superiore -->
    <linearGradient id="topFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb347"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </linearGradient>
    <!-- Gradiente faccia sinistra - OMBRA -->
    <linearGradient id="leftFace" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#cc5500"/>
      <stop offset="100%" stop-color="#e06500"/>
    </linearGradient>
    <!-- Gradiente faccia destra - LUCE -->
    <linearGradient id="rightFace" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff7c20"/>
      <stop offset="100%" stop-color="#ff9a40"/>
    </linearGradient>
    
    <!-- Glow per lettere in luce -->
    <filter id="letterGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Ombra cubo -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="rgba(180,60,0,0.35)"/>
    </filter>
  </defs>

  <!-- Ombra sotto -->
  <ellipse cx="60" cy="108" rx="28" ry="6" fill="rgba(180,80,0,0.18)"/>

  <!-- Cubo isometrico 3D -->
  <!-- Faccia superiore -->
  <polygon points="60,14 100,36 60,58 20,36" fill="url(#topFace)" filter="url(#shadow)"/>
  <!-- Faccia sinistra - OMBRA -->
  <polygon points="20,36 60,58 60,100 20,78" fill="url(#leftFace)"/>
  <!-- Faccia destra - LUCE -->
  <polygon points="60,58 100,36 100,78 60,100" fill="url(#rightFace)"/>

  <!-- Bordi -->
  <polyline points="60,14 100,36 100,78 60,100 20,78 20,36 60,14" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <line x1="60" y1="58" x2="60" y2="100" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- LETTERE CON PROSPETTIVA E COLORI REALISTICI -->
  
  <!-- O - Faccia superiore SX - Inclinata e luminosa dorata -->
  <text x="40" y="35" 
    font-family="'Arial Black', Arial, sans-serif" 
    font-size="14" 
    font-weight="900" 
    fill="#FFF4D6"
    transform="skewY(-30) rotate(-5 40 35)"
    filter="url(#letterGlow)"
    letter-spacing="-1">O</text>

  <!-- R - Faccia superiore DX - Inclinata e luminosa dorata -->
  <text x="80" y="35" 
    font-family="'Arial Black', Arial, sans-serif" 
    font-size="14" 
    font-weight="900" 
    fill="#FFF4D6"
    transform="skewY(30) rotate(5 80 35)"
    filter="url(#letterGlow)"
    letter-spacing="-1">R</text>

  <!-- B - Faccia SX OMBRA - Inclinata e più scura ambrata -->
  <text x="38" y="75" 
    font-family="'Arial Black', Arial, sans-serif" 
    font-size="14" 
    font-weight="900" 
    fill="#D4A574"
    transform="skewX(-15) skewY(15)"
    opacity="0.95"
    letter-spacing="-1">B</text>

  <!-- O - Faccia DX LUCE - Inclinata e più chiara dorata -->
  <text x="82" y="75" 
    font-family="'Arial Black', Arial, sans-serif" 
    font-size="14" 
    font-weight="900" 
    fill="#FFE4B8"
    transform="skewX(15) skewY(-15)"
    letter-spacing="-1">O</text>

  <!-- Luccichio faccia superiore -->
  <polygon points="60,16 80,27 60,38 40,27" fill="rgba(255,255,255,0.15)"/>
</svg>