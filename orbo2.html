<script>// Playables SDK v1.0.0
// Game lifecycle bridge: rAF-based game-ready detection + event communication
(function() {
  'use strict';

  // Idempotency: skip if already initialized (e.g., server-side injection
  // followed by client-side inject-javascript via the Bloks webview component).
  if (window.playablesSDK) return;

  var HANDLER_NAME = 'playablesGameEventHandler';
  var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';
  var RAF_FRAME_THRESHOLD = 3;

  var gameReadySent = false;
  var firstInteractionSent = false;
  var errorSent = false;
  var frameCount = 0;
  var originalRAF = window.requestAnimationFrame;

  // --- Transport Layer ---

  function hasIOSBridge() {
    return !!(window.webkit &&
              window.webkit.messageHandlers &&
              window.webkit.messageHandlers[HANDLER_NAME]);
  }

  function hasAndroidBridge() {
    return !!(window[ANDROID_BRIDGE_NAME] &&
              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

  function isInIframe() {
    return !!(window.parent && window.parent !== window);
  }

  function sendEvent(eventName, payload) {
    var message = {
      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

    if (hasIOSBridge()) {
      try {
        window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
      } catch (e) { /* ignore */ }
      return;
    }

    if (hasAndroidBridge()) {
    try {
      var p = payload || {};
      p.__secureToken = window.__fbAndroidBridgeAuthToken || '';
      p.timestamp = message.timestamp;
      window[ANDROID_BRIDGE_NAME].postEvent(
        eventName,
        JSON.stringify(p)
      );
    } catch (e) { /* ignore */ }
    return;
  }

    if (isInIframe()) {
      try {
        window.parent.postMessage(message, '*');
      } catch (e) { /* ignore */ }
      return;
    }
  }

  // --- rAF Game-Ready Detection ---

  function onFrame() {
    if (gameReadySent) return;

    frameCount++;
    if (frameCount >= RAF_FRAME_THRESHOLD) {
      gameReadySent = true;
      sendEvent('game_ready', {
        frame_count: frameCount,
        detected_at: Date.now()
      });
      return;
    }

    originalRAF.call(window, onFrame);
  }

  if (originalRAF) {
    window.requestAnimationFrame = function(callback) {
      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {
          frameCount++;
          if (frameCount >= RAF_FRAME_THRESHOLD && !gameReadySent) {
            gameReadySent = true;
            sendEvent('game_ready', {
              frame_count: frameCount,
              detected_at: Date.now()
            });
          }
          callback(timestamp);
        });
      }
      return originalRAF.call(window, callback);
    };
  }

  // --- First User Interaction Detection ---

  function setupFirstInteractionDetection() {
    var events = ['touchstart', 'mousedown', 'keydown'];

    function onFirstInteraction() {
      if (firstInteractionSent) return;
      firstInteractionSent = true;
      sendEvent('user_interaction_start', null);

      for (var i = 0; i < events.length; i++) {
        document.removeEventListener(events[i], onFirstInteraction, true);
      }
    }

    for (var i = 0; i < events.length; i++) {
      document.addEventListener(events[i], onFirstInteraction, true);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupFirstInteractionDetection);
  } else {
    setupFirstInteractionDetection();
  }

  // --- Auto Error Capture ---

  window.addEventListener('error', function(event) {
    if (errorSent) return;
    errorSent = true;
    sendEvent('error', {
      message: event.message || 'Unknown error',
      source: event.filename || '',
      lineno: event.lineno || 0,
      colno: event.colno || 0,
      auto_captured: true
    });
  });

  window.addEventListener('unhandledrejection', function(event) {
    if (errorSent) return;
    errorSent = true;
    var reason = event.reason;
    sendEvent('error', {
      message: (reason instanceof Error) ? reason.message : String(reason),
      type: 'unhandled_promise_rejection',
      auto_captured: true
    });
  });

  // --- Public API ---

  window.playablesSDK = {
    complete: function(score) {
      sendEvent('game_ended', {
        score: score,
        completed: true
      });
    },

    error: function(message) {
      if (errorSent) return;
      errorSent = true;
      sendEvent('error', {
        message: message || 'Unknown error',
        auto_captured: false
      });
    },

    sendEvent: function(eventName, payload) {
      if (!eventName || typeof eventName !== 'string') return;
      sendEvent(eventName, payload);
    }
  };

  // Kick off rAF detection in case no game code calls rAF immediately
  if (originalRAF) {
    originalRAF.call(window, onFrame);
  }
})();</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbo v2 — Solo posti dove mangiare</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
html, body {
  height: 100%;
  background: #000;
}
body {
  font-family: 'Outfit', sans-serif;
  overscroll-behavior: none;
}
#map > div {
  background: #050505 !important;
}
.gm-style-cc,
.gmnoprint {
  display: none !important;
}
#sheet {
  transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
}
header {
  background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, transparent 100%);
  padding-bottom: 20px;
}
</style>
</head>
<body class="bg-black text-white">
<div id="map" class="absolute inset-0"></div>
<header class="absolute top-0 left-0 right-0 z-20 p-4">
  <h1 class="text-[22px] font-semibold">Orbo v2</h1>
  <p class="text-[12px] text-white/60">Solo ristoranti, bar, gelaterie</p>
  <input id="search" placeholder="Cerca..." class="w-full h-12 mt-3 px-4 rounded-2xl bg-neutral-900 border border-white/10">
  <div class="mt-3 flex gap-2 overflow-x-auto">
    <button data-type="all" class="px-4 py-2 rounded-full bg-orange-500 text-black font-semibold text-sm whitespace-nowrap">Tutti</button>
    <button data-type="ristoranti" class="px-4 py-2 rounded-full bg-neutral-800 text-white/70 text-sm whitespace-nowrap">🍝 Ristoranti</button>
    <button data-type="bar" class="px-4 py-2 rounded-full bg-neutral-800 text-white/70 text-sm whitespace-nowrap">☕ Bar</button>
    <button data-type="gelaterie" class="px-4 py-2 rounded-full bg-neutral-800 text-white/70 text-sm whitespace-nowrap">🍦 Gelaterie</button>
    <button data-type="pasticcerie" class="px-4 py-2 rounded-full bg-neutral-800 text-white/70 text-sm whitespace-nowrap">🧁 Pasticcerie</button>
  </div>
</header>
<div id="sheet" class="fixed bottom-0 left-0 right-0 z-30 translate-y-[110%] transition">
  <div class="mx-auto max-w-md m-4 p-5 rounded-3xl bg-neutral-900 border border-white/10">
    <button onclick="document.getElementById('sheet').style.transform='translateY(110%)'" class="float-right text-white/40 text-xl leading-none">X</button>
    <h2 id="sheet-title" class="text-lg font-semibold"></h2>
    <p id="sheet-address" class="text-sm text-white/60"></p>
    <div class="flex gap-2 mt-2 text-xs">
      <span id="sheet-rating"></span>
      <span id="sheet-price"></span>
      <span id="sheet-open"></span>
    </div>
    <a id="sheet-directions" class="block mt-3 text-center py-2 rounded-xl bg-orange-500 text-black font-semibold">Indicazioni</a>
  </div>
</div>
<script>
let map, service, markers = [];
const typeMap = {
  all: ['restaurant','cafe','bakery','ice_cream_shop','meal_takeaway'],
  ristoranti: ['restaurant'],
  bar: ['cafe','bar'],
  gelaterie: ['ice_cream_shop'],
  pasticcerie: ['bakery'],
  takeaway: ['meal_takeaway']
};
let activeType = 'all';
function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 44.4949, lng: 11.3426 },
    zoom: 15,
    disableDefaultUI: true,
    styles: [{ elementType: 'geometry', stylers: [{ color: '#050505' }] }]
  });
  service = new google.maps.places.PlacesService(map);
  map.addListener('click', () => {
    document.getElementById('sheet').style.transform = 'translateY(110%)';
  });
  navigator.geolocation?.getCurrentPosition(p => {
    map.setCenter({ lat: p.coords.latitude, lng: p.coords.longitude });
    searchNearby();
  });
  map.addListener('idle', searchNearby);
}
function clearMarkers() {
  markers.forEach(m => m.setMap(null));
  markers = [];
}
function createMarker(place) {
  const m = new google.maps.Marker({ map, position: place.geometry.location, title: place.name });
  m.addListener('click', () => showSheet(place));
  markers.push(m);
}
function searchNearby() {
  clearMarkers();
  const center = map.getCenter();
  for (const type of typeMap[activeType]) {
    service.nearbySearch({ location: center, radius: 1500, type }, (res, status) => {
      if (status === 'OK') res.forEach(createMarker);
    });
  }
}
function showSheet(p) {
  document.getElementById('sheet-title').textContent = p.name;
  document.getElementById('sheet-address').textContent = p.vicinity;
  document.getElementById('sheet-rating').textContent = p.rating ? '★ ' + p.rating : '';
  document.getElementById('sheet-price').textContent = p.price_level ? '€'.repeat(p.price_level) : '';
  document.getElementById('sheet-open').textContent = p.opening_hours ? (p.opening_hours.open_now ? '🟢 Aperto' : '🔴 Chiuso') : '';
  document.getElementById('sheet-directions').href = `https://www.google.com/maps/dir/?api=1&destination_place_id=${p.place_id}`;
  document.getElementById('sheet').style.transform = 'translateY(0)';
}
document.querySelectorAll('[data-type]').forEach(b => {
  b.onclick = () => {
    activeType = b.dataset.type;
    document.querySelectorAll('[data-type]').forEach(x => {
      x.className = 'px-4 py-2 rounded-full bg-neutral-800 text-white/70 text-sm whitespace-nowrap';
    });
    b.className = 'px-4 py-2 rounded-full bg-orange-500 text-black font-semibold text-sm whitespace-nowrap';
    searchNearby();
  };
});
document.getElementById('search').oninput = e => {
  const q = e.target.value;
  if (q.length > 2) {
    service.textSearch({ query: q, location: map.getCenter(), radius: 3000 }, (r, s) => {
      if (s === 'OK') {
        clearMarkers();
        r.forEach(createMarker);
      }
    });
  }
};
</script>
<script async defer src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=places&callback=initMap&language=it&region=IT"></script>
</body>
</html>
